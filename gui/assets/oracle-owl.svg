<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Oracle Knots Owl">
  <defs>
    <linearGradient id="owlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#bd5eff"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#bd5eff" stop-opacity="0.2"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Owl silhouette -->
  <path fill="url(#owlGrad)" opacity="0.9" d="M32 6c-8 0-14 5-16 12-2 1-4 4-4 8 0 3 1 6 3 8-1 2-2 5-2 8 0 7 5 14 12 16 1 4 4 6 7 6s6-2 7-6c7-2 12-9 12-16 0-3-1-6-2-8 2-2 3-5 3-8 0-4-2-7-4-8C46 11 40 6 32 6z"/>
  <!-- Ear tufts -->
  <path fill="#00f0ff" opacity="0.7" d="M18 14l-4-8 6 4zm28 0l4-8-6 4z"/>
  <!-- Face disc -->
  <ellipse cx="32" cy="30" rx="14" ry="12" fill="#090d1a" opacity="0.85"/>
  <!-- Eyes — blockchain nodes -->
  <circle class="owl-eye owl-eye-left" cx="24" cy="28" r="6" fill="url(#eyeGlow)" filter="url(#glow)"/>
  <circle class="owl-eye owl-eye-right" cx="40" cy="28" r="6" fill="url(#eyeGlow)" filter="url(#glow)"/>
  <circle cx="24" cy="28" r="2.5" fill="#05070e"/>
  <circle cx="40" cy="28" r="2.5" fill="#05070e"/>
  <circle cx="25" cy="27" r="1" fill="#00f0ff" opacity="0.9"/>
  <circle cx="41" cy="27" r="1" fill="#00f0ff" opacity="0.9"/>
  <!-- Beak -->
  <path fill="#bd5eff" d="M32 34l-3 5h6z"/>
  <!-- Chain knot accent -->
  <path fill="none" stroke="#00f0ff" stroke-width="1.2" opacity="0.5" d="M10 48c6-4 12-4 22-2s16 2 22-2"/>
  <circle cx="10" cy="48" r="2" fill="#00f0ff" opacity="0.6"/>
  <circle cx="54" cy="44" r="2" fill="#bd5eff" opacity="0.6"/>
</svg>