<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Oracle Knots — The Oracle">
  <defs>
    <linearGradient id="oeArmor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a4666"/>
      <stop offset="45%" stop-color="#232c4a"/>
      <stop offset="100%" stop-color="#161d36"/>
    </linearGradient>
    <linearGradient id="oeArmorLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4d5b82"/>
      <stop offset="100%" stop-color="#28324f"/>
    </linearGradient>
    <linearGradient id="oeWing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b3554"/>
      <stop offset="60%" stop-color="#3d2b5e"/>
      <stop offset="100%" stop-color="#5b2d7a"/>
    </linearGradient>
    <radialGradient id="oeEye" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#e8faff"/>
      <stop offset="30%" stop-color="#7ce4ff"/>
      <stop offset="65%" stop-color="#7a5cff"/>
      <stop offset="100%" stop-color="#bd5eff"/>
    </radialGradient>
    <radialGradient id="oeThirdEye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9f6ff"/>
      <stop offset="60%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#7a5cff" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="oeChestEye" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e29bff"/>
      <stop offset="100%" stop-color="#8a3cc9"/>
    </radialGradient>
    <filter id="oeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="oeSoftGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rune ring (the oracle's arcane circle) -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#00f0ff" stroke-width="0.6" opacity="0.28"
          stroke-dasharray="3 4"/>
  <g stroke="#7ce4ff" stroke-width="0.9" opacity="0.35" stroke-linecap="round">
    <path d="M32 1.5v3M32 59.5v3M1.5 32h3M59.5 32h3"/>
    <path d="M10.5 10.5l2 2M51.5 51.5l2 2M53.5 10.5l-2 2M12.5 51.5l-2 2"/>
  </g>

  <!-- Wings: layered feather plates -->
  <g fill="url(#oeWing)" stroke="#0b1020" stroke-width="0.5">
    <path d="M13 24c-3 4-4 10-3 16 1 5 3 9 6 11 1-3 1-7 0-11l3 9c1-4 1-8-1-12l4 8c0-5-1-9-3-13-2-3-4-6-6-8z"/>
    <path d="M51 24c3 4 4 10 3 16-1 5-3 9-6 11-1-3-1-7 0-11l-3 9c-1-4-1-8 1-12l-4 8c0-5 1-9 3-13 2-3 4-6 6-8z"/>
  </g>
  <!-- Wing circuit traces -->
  <g fill="none" stroke="#00f0ff" stroke-width="0.6" opacity="0.55">
    <path d="M14 32c1 4 1 8 3 12M50 32c-1 4-1 8-3 12"/>
  </g>

  <!-- Body armor -->
  <path fill="url(#oeArmor)" stroke="#0b1020" stroke-width="0.6"
        d="M32 10c-8 0-13 5-15 11-1 4-2 8-2 13 0 9 5 17 12 20 2 1 4 1.5 5 1.5s3-.5 5-1.5c7-3 12-11 12-20 0-5-1-9-2-13-2-6-7-11-15-11z"/>

  <!-- Ear tufts: sharp metallic horns -->
  <g fill="url(#oeArmorLight)" stroke="#0b1020" stroke-width="0.5">
    <path d="M20 15L14 4l8 7z"/>
    <path d="M44 15l6-11-8 7z"/>
  </g>
  <path fill="#00f0ff" opacity="0.5" d="M17.5 9.5L15 5l4 3.5zM46.5 9.5L49 5l-4 3.5z"/>

  <!-- Head plate / brow -->
  <path fill="url(#oeArmorLight)" stroke="#0b1020" stroke-width="0.6"
        d="M32 10c-6 0-10 3-12 7 1 3 3 5 5 5h14c2 0 4-2 5-5-2-4-6-7-12-7z"/>

  <!-- Third eye on forehead -->
  <circle cx="32" cy="15.5" r="2.2" fill="#0b1020"/>
  <circle cx="32" cy="15.5" r="1.5" fill="url(#oeThirdEye)" filter="url(#oeSoftGlow)"/>

  <!-- Face disc -->
  <path fill="#0b1020" opacity="0.92"
        d="M32 18c-7 0-12 4-13 9 0 5 5 9 13 9s13-4 13-9c-1-5-6-9-13-9z"/>
  <!-- Face disc etched rings -->
  <path fill="none" stroke="#3a4666" stroke-width="0.7" opacity="0.8"
        d="M32 19.5c-6 0-10.5 3.5-11.5 7.5.5 4 5 7.5 11.5 7.5s11-3.5 11.5-7.5c-1-4-5.5-7.5-11.5-7.5z"/>

  <!-- Eyes: big luminous violet-cyan orbs with tech iris rings -->
  <g filter="url(#oeGlow)">
    <circle cx="24.5" cy="27" r="5.4" fill="url(#oeEye)"/>
    <circle cx="39.5" cy="27" r="5.4" fill="url(#oeEye)"/>
  </g>
  <g fill="none" stroke="#05070e" stroke-width="0.8" opacity="0.85">
    <circle cx="24.5" cy="27" r="3.6"/>
    <circle cx="39.5" cy="27" r="3.6"/>
  </g>
  <circle cx="24.5" cy="27" r="2" fill="#1b0b33"/>
  <circle cx="39.5" cy="27" r="2" fill="#1b0b33"/>
  <circle cx="25.3" cy="26.2" r="0.9" fill="#e8faff"/>
  <circle cx="40.3" cy="26.2" r="0.9" fill="#e8faff"/>
  <!-- Fierce brow line -->
  <path fill="none" stroke="#4d5b82" stroke-width="1.1" stroke-linecap="round"
        d="M19.5 21.5l6 2.2M44.5 21.5l-6 2.2"/>

  <!-- Beak: dark metallic -->
  <path fill="#161d36" stroke="#0b1020" stroke-width="0.5" d="M32 30.5l-2.8 4.5 2.8 2 2.8-2z"/>

  <!-- Chest: gear with the all-seeing eye -->
  <g transform="translate(32 46)">
    <g fill="url(#oeArmorLight)" stroke="#0b1020" stroke-width="0.5">
      <path d="M0-8.6l1.4 2.2h-2.8zM0 8.6l1.4-2.2h-2.8zM8.6 0L6.4 1.4v-2.8zM-8.6 0l2.2 1.4v-2.8z
               M6.1-6.1L4.6-4l-1.7-1.7zM-6.1 6.1L-4.6 4l1.7 1.7zM6.1 6.1L4 4.6l1.7-1.7zM-6.1-6.1L-4-4.6l-1.7 1.7z"/>
      <circle r="6.6"/>
    </g>
    <circle r="4.6" fill="#0b1020"/>
    <ellipse rx="3.4" ry="2.2" fill="#e29bff" opacity="0.25"/>
    <circle r="2" fill="url(#oeChestEye)" filter="url(#oeSoftGlow)"/>
    <circle r="0.8" fill="#2a0b40"/>
    <circle cx="0.4" cy="-0.4" r="0.35" fill="#ffffff"/>
  </g>

  <!-- Body circuit traces -->
  <g fill="none" stroke="#00f0ff" stroke-width="0.55" opacity="0.6" stroke-linecap="round">
    <path d="M22 38v5l3 3M42 38v5l-3 3"/>
    <path d="M26 54l2 2M38 54l-2 2"/>
  </g>
  <circle cx="22" cy="38" r="0.8" fill="#00f0ff" opacity="0.8"/>
  <circle cx="42" cy="38" r="0.8" fill="#00f0ff" opacity="0.8"/>
</svg>
