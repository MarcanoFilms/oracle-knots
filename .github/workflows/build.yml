name: Oracle Knots Build CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gui-smoke:
    name: GUI API Smoke Test
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install GUI dependencies
      run: pip install bottle requests proxy_tools

    - name: Run GUI smoke tests
      run: python test/smoke_gui.py

    - name: Run portfolio unit tests
      run: python test/test_portfolio.py -v
