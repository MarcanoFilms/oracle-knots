name: Oracle Knots Build CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Oracle Knots on Linux
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libboost-dev libssl-dev libevent-dev libsqlite3-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build project
      run: cmake --build build -j$(nproc)

  gui-smoke:
    name: GUI API Smoke Test
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install GUI dependencies
      run: pip install -r requirements.txt

    - name: Run GUI smoke tests
      run: python test/smoke_gui.py
